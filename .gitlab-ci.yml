stages:
  - build_ci_image

build_ci_image:
  stage: build_ci_image
  image: harbor.windmaker.net/limani/base_docker:latest
  before_script:
    - echo "$GIT_CRYPT_KEY_B64" | base64 -d | git-crypt unlock -
    - source config/common.env
    - source config/ci.env
  script:
    - export IMAGE_NAME=karavomarangos_ci
    - export IS_BASE_IMAGE=1
    - docker-build
  only:
    - /^ci(-|_).*$/
